<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
    <style>
        .text { 
            font-family: ui-serif, Georgia, Cambria, "Times New Roman", Times, serif; 
            font-weight: 700; 
            font-size: 70px; 
            fill: #121216; 
        }
        .dot { 
            fill: #0f766e; 
        }
        @media (prefers-color-scheme: dark) {
            .text { fill: #f0f0f4; }
            .dot { fill: #2dd4bf; }
        }
    </style>
    <text x="50%" y="55%" dominant-baseline="middle" text-anchor="middle" class="text">RM<tspan class="dot">.</tspan></text>
</svg>
